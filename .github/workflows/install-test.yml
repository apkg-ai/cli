name: Installer smoke test

on:
  pull_request:
    paths:
      - install.sh
      - .github/workflows/install-test.yml
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-26
          - macos-26-intel

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run installer
        run: sh install.sh

      - name: Smoke test
        run: ~/.apkg/bin/apkg --version
